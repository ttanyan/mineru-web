version: '3.8'

services:
  # 前端开发服务
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
    depends_on:
      - backend-dev
    networks:
      - mineru-dev-network
    command: npm run dev -- --host 0.0.0.0 --port 80

  # 后端开发服务
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./mineru.json:/root/mineru.json
      - ./models2.0:/models
    environment:
      - REDIS_HOST=redis-dev
      - REDIS_PASSWORD=redispassword
      - MINIO_ENDPOINT=minio-dev:9000
      - DATABASE_URL=sqlite:///./mineru.db
      - BACKEND=vllm-client
      - SERVER_URL=http://vllm-server-dev:30000
      - PRELOAD_MODEL=false
      - WORKER_ID=dev-worker-1
    depends_on:
      redis-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
    networks:
      - mineru-dev-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 开发用 Worker 服务
  worker-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ./mineru.json:/root/mineru.json
      - ./models2.0:/models
    environment:
      - REDIS_HOST=redis-dev
      - REDIS_PASSWORD=redispassword
      - MINIO_ENDPOINT=minio-dev:9000
      - DATABASE_URL=sqlite:///./mineru.db
      - SERVER_URL=http://vllm-server-dev:30000
      - WORKER_ID=dev-worker-1
    depends_on:
      redis-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
    networks:
      - mineru-dev-network
    command: python run_worker.py

  # Redis 开发服务
  redis-dev:
    image: redis:latest
    ports:
      - "6380:6379"  # 使用不同端口避免冲突
    volumes:
      - redis_dev_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass redispassword --appendonly yes
    environment:
      - REDIS_PASSWORD=redispassword
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mineru-dev-network

  # MinIO 开发服务
  minio-dev:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    ports:
      - "9002:9000"  # 使用不同端口避免冲突
      - "9003:9001"  # MinIO 控制台端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - mineru-dev-network

  # vLLM 开发服务（可选）
  vllm-server-dev:
    image: vllm/vllm-openai:latest
    ports:
      - "30001:30000"  # 使用不同端口避免冲突
    environment:
      - HF_MODEL=/models/vlm
    volumes:
      - ./models2.0:/models
    command: --model /models/vlm --host 0.0.0.0 --port 30000
    networks:
      - mineru-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_dev_data:
  minio_dev_data:

networks:
  mineru-dev-network:
    driver: bridge